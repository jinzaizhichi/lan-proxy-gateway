# lan-proxy-gateway - mihomo 配置模板
# 所有 {{变量}} 会在运行时被替换为实际值
# 敏感信息（订阅链接）存放在 .secret 文件中，不会进入 Git

mixed-port: {{MIXED_PORT}}
redir-port: {{REDIR_PORT}}
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning
external-controller: 0.0.0.0:{{API_PORT}}
external-ui: ui
ipv6: false

# TUN 模式（gateway tun on/off 控制，默认关闭）
{{TUN_CONFIG}}

tcp-concurrent: true

# DNS 设置
dns:
  enable: true
  listen: 0.0.0.0:{{DNS_LISTEN_PORT}}
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN

# ============================================
# 代理节点与代理组
# 由 internal/template 包根据 proxy.source 动态生成：
#   url/file  → proxy-providers 订阅/文件模式
#   proxy     → proxies 直接代理服务器模式
# ============================================
{{PROXY_BLOCK}}

# ============================================
# 分流规则
# 由 internal/rules 包按配置动态生成
# ============================================
{{RULES_BLOCK}}
