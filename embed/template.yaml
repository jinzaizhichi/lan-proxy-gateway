# lan-proxy-gateway - mihomo 配置模板
# 所有 {{变量}} 会在运行时被替换为实际值
# 敏感信息（订阅链接）存放在 .secret 文件中，不会进入 Git

mixed-port: {{MIXED_PORT}}
redir-port: {{REDIR_PORT}}
allow-lan: true
bind-address: '*'
mode: rule
log-level: warning
external-controller: 0.0.0.0:{{API_PORT}}
external-ui: ui
ipv6: false

# TUN 模式（gateway tun on/off 控制，默认关闭）
{{TUN_CONFIG}}

tcp-concurrent: true

# DNS 设置
dns:
  enable: true
  listen: 0.0.0.0:{{DNS_LISTEN_PORT}}
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localhost'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN

# ============================================
# 代理节点 - 通过 proxy-providers 远程拉取
# 不在此文件中硬编码任何节点信息
# ============================================
proxy-providers:
  {{SUBSCRIPTION_NAME}}:
    type: http
    url: "{{SUBSCRIPTION_URL}}"
    interval: 1800
    path: ./proxy_provider/{{SUBSCRIPTION_NAME}}.yaml
    health-check:
      enable: true
      interval: 120
      url: http://www.gstatic.com/generate_204

# 代理组 - 使用 proxy-providers 中的节点
proxy-groups:
  - name: Proxy
    type: select
    use:
      - {{SUBSCRIPTION_NAME}}
    proxies:
      - Auto
      - Fallback
      - DIRECT

  - name: Auto
    type: url-test
    use:
      - {{SUBSCRIPTION_NAME}}
    url: http://www.gstatic.com/generate_204
    interval: 120
    tolerance: 100

  - name: Fallback
    type: fallback
    use:
      - {{SUBSCRIPTION_NAME}}
    url: http://www.gstatic.com/generate_204
    interval: 120

# ============================================
# 分流规则
# 由 internal/rules 包按配置动态生成
# ============================================
{{RULES_BLOCK}}
