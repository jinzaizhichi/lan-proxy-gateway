# mihomo skeleton rendered by lan-proxy-gateway v2.
# {{TOKENS}} are replaced at runtime by internal/engine/render.go.
mixed-port: {{MIXED_PORT}}
redir-port: {{REDIR_PORT}}
tproxy-port: 0
allow-lan: true
bind-address: "*"
mode: {{MIHOMO_MODE}}
log-level: {{LOG_LEVEL}}
# IPv6 放行：允许 mihomo 处理 IPv6 目标地址的连接、也让 DNS 返回 AAAA。
# 关了会导致双栈目标（chatgpt.com / cloudflare.com 等）在 IPv6 优先的客户端
# 上解析失败、访问超时；v2.x 版本默认就是开的，v3.0 迁移时从 v1 模板里误把
# 这行带成了 false，本行是恢复 v2 行为。
# 注意：TUN 块里默认不劫持 IPv6 路由（不写 inet6-address），IPv6 流量继续走
# 系统默认路由，避免 Linux 下 TUN strict-route 把本机 IPv6 对外可达性切断。
ipv6: true
unified-delay: true

external-controller: 0.0.0.0:{{API_PORT}}
# 浏览器访问 http://<host>:<api_port>/ui 打开 Web 控制台。
# UI 静态文件放在 mihomo workdir/ui 下（metacubexd / yacd 都可）。
# 目录不存在时 /ui 返回 404，但 API 本体不受影响。
external-ui: ui
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true

{{TUN_CONFIG}}

dns:
  enable: {{DNS_ENABLED}}
  listen: 0.0.0.0:{{DNS_PORT}}
  # 返回 AAAA：对照上面 `ipv6: true`，不然客户端拿不到 IPv6 地址也就无从发起
  # IPv6 连接，跟关 ipv6 效果一样。v2.x 默认放开；v3 修复后对齐。
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
  # 专门给代理服务器本身的域名用的 DNS。没这个的话当 Proxy 组的
  # 节点是域名形式（例如 abc.example.com:443），mihomo 解析这个域名时
  # 又要走 Proxy 组 → 自己等自己 → 死锁（日志里会看到大面积
  # `dns resolve failed: context canceled`）。用国内 DNS IP 直接解。
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
  # fallback DoH 必须走 Proxy 组；否则国内直连 1.1.1.1 / 8.8.8.8 被墙，
  # fallback 永远超时，拖慢所有国外域名的解析。
  fallback:
    - https://1.1.1.1/dns-query#Proxy
    - https://8.8.8.8/dns-query#Proxy
  fallback-filter:
    geoip: true
    geoip-code: CN

profile:
  store-selected: true
  store-fake-ip: true

{{PROXY_BLOCK}}

{{RULES_BLOCK}}
