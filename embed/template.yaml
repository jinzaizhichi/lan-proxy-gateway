# mihomo skeleton rendered by lan-proxy-gateway v2.
# {{TOKENS}} are replaced at runtime by internal/engine/render.go.
mixed-port: {{MIXED_PORT}}
redir-port: {{REDIR_PORT}}
tproxy-port: 0
allow-lan: true
bind-address: "*"
mode: {{MIHOMO_MODE}}
log-level: {{LOG_LEVEL}}
ipv6: false
unified-delay: true

external-controller: 0.0.0.0:{{API_PORT}}
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true

{{TUN_CONFIG}}

dns:
  enable: {{DNS_ENABLED}}
  listen: 0.0.0.0:{{DNS_PORT}}
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "localhost.ptlogin2.qq.com"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

profile:
  store-selected: true
  store-fake-ip: true

{{PROXY_BLOCK}}

{{RULES_BLOCK}}
