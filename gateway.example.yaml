# lan-proxy-gateway 配置文件
# 此文件包含敏感信息，请勿提交到 Git

# 代理来源: "url" (订阅链接) 或 "file" (本地配置文件)
proxy_source: url

# 代理模式:
#   rule        - 规则分流（默认），国内直连、国外走代理
#   global      - 全局机场代理，所有流量通过机场节点
#   global_isp  - 全局住宅ISP，所有流量经由 机场→住宅IP 链式代理
#   ai_proxy    - AI工作流代理，AI服务强制走住宅IP，阿里系办公直连
#                （global_isp / ai_proxy 需配置下方 chain_proxy）
proxy_mode: rule

# 订阅链接 (proxy_source: url 时必填)
subscription_url: "https://your-subscription-url-here"

# 本地配置文件路径 (proxy_source: file 时必填)
# proxy_config_file: /path/to/your/clash-config.yaml

# 代理源名称
subscription_name: subscription

# 端口配置
ports:
  mixed: 7890     # 混合代理 (HTTP + SOCKS5)
  redir: 7892     # 透明代理
  api: 9090       # mihomo API 面板
  dns: 53         # DNS 服务

# API 密钥 (留空则无需认证)
api_secret: ""

# 链式代理配置（全局住宅ISP模式必填）
# 流量路径: 客户端 → 机场节点 → 住宅ISP代理 → 目标网站
# chain_proxy:
#   enabled: true
#   name: my-isp-proxy
#   type: socks5
#   server: your-isp-proxy-server
#   port: 1080
#   username: your-username
#   password: your-password
#   udp: false
